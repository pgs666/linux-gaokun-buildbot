name: Build Gaokun3 Package RPMs

on:
  workflow_dispatch:
    inputs:
      kernel_tag:
        description: Linux kernel tag
        required: true
        default: "v7.0-rc6"
      package_release_tag:
        description: Fixed GitHub release tag used for package assets
        required: true
        default: "gaokun3-packages-rpm"
  workflow_call:
    inputs:
      kernel_tag:
        description: Linux kernel tag
        required: true
        type: string
      package_release_tag:
        description: Fixed GitHub release tag used for package assets
        required: false
        default: "gaokun3-packages-rpm"
        type: string

permissions:
  contents: write

jobs:
  build-package-rpms:
    runs-on: ubuntu-24.04-arm
    env:
      TZ: UTC
      KERNEL_TAG: ${{ inputs.kernel_tag || github.event.inputs.kernel_tag }}
      PACKAGE_RELEASE_TAG: ${{ inputs.package_release_tag || github.event.inputs.package_release_tag }}
      GAOKUN_DIR: ${{ github.workspace }}
      WORKDIR: ${{ github.workspace }}/build-packages
      KERN_SRC: ${{ github.workspace }}/build-packages/mainline-linux
      KERN_OUT: ${{ github.workspace }}/build-packages/kernel-out
      ARTIFACT_DIR: ${{ github.workspace }}/build-packages/artifacts

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Checkout Linux source
        uses: actions/checkout@v6
        with:
          repository: torvalds/linux
          ref: ${{ env.KERNEL_TAG }}
          fetch-depth: 1
          path: build-packages/mainline-linux

      - name: Install host dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            git make gcc bc bison flex cpio rsync kmod \
            libssl-dev libelf-dev dwarves ccache

      - name: Restore ccache
        uses: actions/cache@v5
        with:
          path: ~/.ccache
          key: gaokun3-packages-rpm-ccache-${{ env.KERNEL_TAG }}-${{ hashFiles('patches/*.patch', 'defconfig/**', 'dts/**', 'drivers/**', 'packaging/**', 'firmware/**', 'scripts/ci/*.sh', '.github/workflows/gaokun3-package-rpms.yml') }}
          restore-keys: |
            gaokun3-packages-rpm-ccache-${{ env.KERNEL_TAG }}-
            gaokun3-packages-rpm-ccache-

      - name: Build gaokun kernel tree
        run: |
          set -euxo pipefail
          mkdir -p "$WORKDIR" "$KERN_OUT" "$ARTIFACT_DIR"

          if [[ "$(uname -m)" == "aarch64" ]]; then
            CROSS_COMPILE=""
          else
            CROSS_COMPILE="aarch64-linux-gnu-"
          fi

          export ARCH=arm64
          export CCACHE_DIR="${CCACHE_DIR:-$HOME/.ccache}"
          export PATH="/usr/lib/ccache:$PATH"

          git -C "$KERN_SRC" config user.name "github-actions[bot]"
          git -C "$KERN_SRC" config user.email "github-actions[bot]@users.noreply.github.com"

          git -C "$KERN_SRC" am "$GAOKUN_DIR"/patches/*.patch

          unset KCONFIG_CONFIG
          make -C "$KERN_SRC" O="$KERN_OUT" ARCH=arm64 CROSS_COMPILE="$CROSS_COMPILE" gaokun3_defconfig
          make -C "$KERN_SRC" O="$KERN_OUT" ARCH=arm64 CROSS_COMPILE="$CROSS_COMPILE" olddefconfig
          make -C "$KERN_SRC" O="$KERN_OUT" ARCH=arm64 CROSS_COMPILE="$CROSS_COMPILE" -j"$(nproc)"
          make -C "$KERN_SRC" O="$KERN_OUT" ARCH=arm64 CROSS_COMPILE="$CROSS_COMPILE" modules_prepare

          KREL="$(cat "$KERN_OUT/include/config/kernel.release")"
          echo "$KREL" > "$WORKDIR/kernel-release.txt"

      - name: Build RPM packages
        run: |
          sudo docker run --rm \
            -v "$GITHUB_WORKSPACE":"$GITHUB_WORKSPACE" \
            -w "$GITHUB_WORKSPACE" \
            -e GAOKUN_DIR="$GAOKUN_DIR" \
            -e WORKDIR="$WORKDIR" \
            -e KERN_SRC="$KERN_SRC" \
            -e KERN_OUT="$KERN_OUT" \
            -e ARTIFACT_DIR="$ARTIFACT_DIR" \
            -e KERNEL_TAG="$KERNEL_TAG" \
            -e PACKAGE_RELEASE_TAG="$PACKAGE_RELEASE_TAG" \
            --user root \
            "fedora:44" \
            bash -euxo pipefail -c '
              dnf -y install gcc make rpm-build kmod elfutils-libelf-devel tar gzip rsync
              scripts/ci/70_build_package_rpms.sh
            '

      - name: Upload build artifacts (workflow)
        uses: actions/upload-artifact@v6
        with:
          name: gaokun3-package-rpms
          path: |
            ${{ env.ARTIFACT_DIR }}/*.rpm
            ${{ env.ARTIFACT_DIR }}/package-manifest.json
            ${{ env.ARTIFACT_DIR }}/package-release-body.md

      - name: Publish package release
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: ${{ env.PACKAGE_RELEASE_TAG }}
          name: gaokun3 package RPMs
          body_path: ${{ env.ARTIFACT_DIR }}/package-release-body.md
          prerelease: false
          make_latest: false
          append_body: false
          overwrite_files: true
          files: |
            ${{ env.ARTIFACT_DIR }}/*.rpm
            ${{ env.ARTIFACT_DIR }}/package-manifest.json
