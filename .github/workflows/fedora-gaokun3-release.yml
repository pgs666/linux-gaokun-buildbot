name: Build Fedora Gaokun3 Image

on:
  workflow_dispatch:
    inputs:
      fedora_release:
        description: Fedora release version
        required: true
        default: "44"
      kernel_tag:
        description: Linux kernel tag
        required: true
        default: "v7.0-rc5"
      desktop_environment:
        description: Desktop environment package group (single package or group)
        required: true
        default: "@gnome-desktop"
      excluded_packages:
        description: Packages to exclude from rootfs install (comma-separated)
        required: true
        default: "gnome-boxes,gnome-connections,gnome-browser-connector,snapshot,gnome-weather,gnome-contacts,gnome-maps,simple-scan,gnome-clocks,gnome-calculator,gnome-calendar"
      extra_packages:
        description: Extra packages to install (space-separated)
        required: true
        default: "fcitx5-chinese-addons gnome-tweaks telnet mpv v4l-utils vim git htop fastfetch screen firefox"
      rebuild_package_rpms:
        description: Rebuild gaokun package RPMs before image build
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-package-rpms:
    if: ${{ github.event.inputs.rebuild_package_rpms == 'true' }}
    uses: ./.github/workflows/gaokun3-package-rpms.yml
    with:
      kernel_tag: ${{ github.event.inputs.kernel_tag }}
      package_release_tag: gaokun3-packages
    secrets: inherit

  build-and-release:
    needs: build-package-rpms
    if: ${{ !cancelled() && (needs.build-package-rpms.result == 'success' || needs.build-package-rpms.result == 'skipped') }}
    runs-on: ubuntu-24.04-arm
    env:
      TZ: UTC
      FEDORA_RELEASE: ${{ github.event.inputs.fedora_release }}
      KERNEL_TAG: ${{ github.event.inputs.kernel_tag }}
      DESKTOP_ENVIRONMENT: ${{ github.event.inputs.desktop_environment }}
      EXCLUDED_PACKAGES: ${{ github.event.inputs.excluded_packages }}
      EXTRA_PACKAGES: ${{ github.event.inputs.extra_packages }}
      IMAGE_SIZE: 12G
      IMAGE_CHUNK_SIZE: 1900M
      GAOKUN_DIR: ${{ github.workspace }}
      WORKDIR: ${{ github.workspace }}/build-fedora
      ROOTFS_DIR: ${{ github.workspace }}/build-fedora/rootfs
      ARTIFACT_DIR: ${{ github.workspace }}/build-fedora/artifacts
      PACKAGE_RPMS_DIR: ${{ github.workspace }}/build-fedora/package-rpms
      PACKAGE_RELEASE_TAG: gaokun3-packages
      IMAGE_FILE: ${{ github.workspace }}/build-fedora/fedora-${{ github.event.inputs.fedora_release }}-gaokun3.img

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install host dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            rsync kmod curl jq \
            parted dosfstools e2fsprogs btrfs-progs zstd xz-utils python3

      - name: Prepare build workspace
        run: |
          set -euxo pipefail
          mkdir -p "$WORKDIR" "$ROOTFS_DIR" "$ARTIFACT_DIR"

      - name: Download gaokun package RPMs
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euxo pipefail
          mkdir -p "$PACKAGE_RPMS_DIR"

          api_url="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${PACKAGE_RELEASE_TAG}"
          release_json="$WORKDIR/package-release.json"

          curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "$api_url" \
            -o "$release_json"

          asset_name="package-manifest.json"
          asset_url="$(jq -r --arg name "$asset_name" '.assets[] | select(.name == $name) | .url' "$release_json")"

          if [[ -z "$asset_url" || "$asset_url" == "null" ]]; then
            echo "missing asset ${asset_name} in release ${PACKAGE_RELEASE_TAG}" >&2
            exit 1
          fi

          curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/octet-stream" \
            "$asset_url" \
            -o "$PACKAGE_RPMS_DIR/$asset_name"

          manifest_path="$PACKAGE_RPMS_DIR/package-manifest.json"
          manifest_kernel_tag="$(jq -r '.kernel_tag' "$manifest_path")"

          if [[ "$manifest_kernel_tag" != "$KERNEL_TAG" ]]; then
            echo "package release kernel tag mismatch: expected ${KERNEL_TAG}, got ${manifest_kernel_tag}" >&2
            exit 1
          fi

          for asset_name in \
            "$(jq -r '.packages.kernel' "$manifest_path")" \
            "$(jq -r '.packages.kernel_modules' "$manifest_path")" \
            "$(jq -r '.packages.firmware' "$manifest_path")"; do
            asset_url="$(jq -r --arg name "$asset_name" '.assets[] | select(.name == $name) | .url' "$release_json")"

            if [[ -z "$asset_url" || "$asset_url" == "null" ]]; then
              echo "missing asset ${asset_name} in release ${PACKAGE_RELEASE_TAG}" >&2
              exit 1
            fi

            curl -fsSL \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/octet-stream" \
              "$asset_url" \
              -o "$PACKAGE_RPMS_DIR/$asset_name"
          done

      - name: Bootstrap Fedora rootfs
        run: |
          set -euxo pipefail
          sudo docker run --rm \
            -v "$GITHUB_WORKSPACE":"$GITHUB_WORKSPACE" \
            -w "$GITHUB_WORKSPACE" \
            --user root \
            "fedora:${FEDORA_RELEASE}" \
            bash -euxo pipefail -c '
              echo "%_install_langs all" > /etc/rpm/macros.image-language-conf
              sed -i "/tsflags=nodocs/d" /etc/dnf/dnf.conf

              mkdir -p "'"$ROOTFS_DIR"'/etc"

              dnf -y --installroot="'"$ROOTFS_DIR"'" --releasever="'"$FEDORA_RELEASE"'" --forcearch=aarch64 --use-host-config \
                --exclude="'"$EXCLUDED_PACKAGES"'" \
                install \
                @core @standard "'"$DESKTOP_ENVIRONMENT"'" \
                grub2-efi-aa64-modules efibootmgr shim-aa64 alsa-ucm \
                langpacks-en langpacks-zh_CN \
                alsa-utils pipewire-utils \
                '"$EXTRA_PACKAGES"'
            '

      - name: Install gaokun package RPMs into rootfs
        run: |
          set -euxo pipefail
          manifest_path="$PACKAGE_RPMS_DIR/package-manifest.json"
          manifest_kernel_release="$(jq -r '.kernel_release' "$manifest_path")"
          kernel_rpm_name="$(jq -r '.packages.kernel' "$manifest_path")"
          kernel_modules_rpm_name="$(jq -r '.packages.kernel_modules' "$manifest_path")"
          firmware_rpm_name="$(jq -r '.packages.firmware' "$manifest_path")"
          echo "$manifest_kernel_release" > "$WORKDIR/kernel-release.txt"

          sudo docker run --rm \
            -v "$(dirname "$ROOTFS_DIR")":"$(dirname "$ROOTFS_DIR")" \
            -v "$PACKAGE_RPMS_DIR":"$PACKAGE_RPMS_DIR" \
            -w / \
            --user root \
            "fedora:${FEDORA_RELEASE}" \
            bash -euxo pipefail -c '
              dnf -y --installroot="'"$ROOTFS_DIR"'" --releasever="'"$FEDORA_RELEASE"'" --use-host-config --nogpgcheck \
                install \
                "'"$PACKAGE_RPMS_DIR"'/'"$kernel_rpm_name"'" \
                "'"$PACKAGE_RPMS_DIR"'/'"$kernel_modules_rpm_name"'" \
                "'"$PACKAGE_RPMS_DIR"'/'"$firmware_rpm_name"'"
            '

          sudo depmod -b "$ROOTFS_DIR" -a "$manifest_kernel_release"

      - name: Populate rootfs (tools and services)
        run: |
          set -euxo pipefail
          sudo mkdir -p \
            "$ROOTFS_DIR/usr/local/bin" \
            "$ROOTFS_DIR/etc/systemd/system" \
            "$ROOTFS_DIR/usr/share/alsa/ucm2/Qualcomm/sc8280xp"
          sudo cp "$GAOKUN_DIR/tools/touchpad/huawei-tp-activate.py" "$ROOTFS_DIR/usr/local/bin/"
          sudo cp "$GAOKUN_DIR/tools/touchpad/huawei-touchpad.service" "$ROOTFS_DIR/etc/systemd/system/"
          sudo chmod +x "$ROOTFS_DIR/usr/local/bin/huawei-tp-activate.py"
          sudo cp "$GAOKUN_DIR/tools/monitors/gdm-monitor-sync" "$ROOTFS_DIR/usr/local/bin/"
          sudo cp "$GAOKUN_DIR/tools/monitors/gdm-monitor-sync.service" \
            "$ROOTFS_DIR/etc/systemd/system/"
          sudo chmod +x "$ROOTFS_DIR/usr/local/bin/gdm-monitor-sync"
          sudo cp "$GAOKUN_DIR/tools/bluetooth/patch-nvm-bdaddr.py" "$ROOTFS_DIR/usr/local/bin/"
          sudo chmod +x "$ROOTFS_DIR/usr/local/bin/patch-nvm-bdaddr.py"
          sudo cp "$GAOKUN_DIR/tools/audio/sc8280xp.conf" \
            "$ROOTFS_DIR/usr/share/alsa/ucm2/Qualcomm/sc8280xp/"

      - name: Create disk image and configure boot
        run: |
          scripts/ci/50_make_image.sh

      - name: Package image and generate release info
        id: package
        run: |
          scripts/ci/60_package_release.sh
          TAG_NAME="$(cat "$WORKDIR/tag-name.txt")"
          KREL="$(cat "$WORKDIR/kernel-release-export.txt")"
          PACKAGE_GLOB="$(cat "$WORKDIR/package-glob.txt")"
          RELEASE_BODY_FILE="$(cat "$WORKDIR/release-body-file.txt")"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "artifact_dir=$ARTIFACT_DIR" >> "$GITHUB_OUTPUT"
          echo "kernel_release=$KREL" >> "$GITHUB_OUTPUT"
          echo "package_glob=$PACKAGE_GLOB" >> "$GITHUB_OUTPUT"
          echo "release_body_file=$RELEASE_BODY_FILE" >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts (workflow)
        uses: actions/upload-artifact@v6
        with:
          name: fedora-gaokun3-build
          path: |
            ${{ steps.package.outputs.artifact_dir }}/${{ steps.package.outputs.package_glob }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: ${{ steps.package.outputs.tag_name }}
          name: Fedora Linux ${{ env.FEDORA_RELEASE }} - gaokun3 - ${{ steps.package.outputs.kernel_release }}
          body_path: ${{ steps.package.outputs.artifact_dir }}/${{ steps.package.outputs.release_body_file }}
          files: |
            ${{ steps.package.outputs.artifact_dir }}/${{ steps.package.outputs.package_glob }}
