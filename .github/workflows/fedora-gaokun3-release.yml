name: Build Fedora Gaokun3 Image

on:
  workflow_dispatch:
    inputs:
      fedora_release:
        description: Fedora release version
        required: true
        default: "44"
      kernel_tag:
        description: Linux kernel tag
        required: true
        default: "v7.0-rc4"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-24.04-arm
    env:
      TZ: UTC
      FEDORA_RELEASE: ${{ github.event.inputs.fedora_release }}
      KERNEL_TAG: ${{ github.event.inputs.kernel_tag }}
      IMAGE_SIZE: 12G
      IMAGE_CHUNK_SIZE: 1900M
      GAOKUN_DIR: ${{ github.workspace }}
      WORKDIR: ${{ github.workspace }}/build-fedora
      KERN_SRC: ${{ github.workspace }}/build-fedora/mainline-linux
      KERN_OUT: ${{ github.workspace }}/build-fedora/kernel-out
      ROOTFS_DIR: ${{ github.workspace }}/build-fedora/rootfs
      ARTIFACT_DIR: ${{ github.workspace }}/build-fedora/artifacts
      FW_REPO: ${{ github.workspace }}/firmware
      IMAGE_FILE: ${{ github.workspace }}/build-fedora/fedora-${{ github.event.inputs.fedora_release }}-gaokun3.img

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Checkout Linux source
        uses: actions/checkout@v6
        with:
          repository: torvalds/linux
          ref: ${{ env.KERNEL_TAG }}
          fetch-depth: 1
          path: build-fedora/mainline-linux

      - name: Install host dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            git make bc bison flex cpio rsync kmod fakeroot \
            libssl-dev libelf-dev dwarves ccache \
            curl jq \
            parted dosfstools e2fsprogs btrfs-progs zstd xz-utils python3

      - name: Restore ccache
        uses: actions/cache@v5
        with:
          path: ~/.ccache
          key: gaokun3-ccache-${{ env.KERNEL_TAG }}-${{ hashFiles('gaokun-patches/*.patch', 'scripts/ci/20_build_kernel.sh') }}
          restore-keys: |
            gaokun3-ccache-${{ env.KERNEL_TAG }}-
            gaokun3-ccache-

      - name: Prepare build workspace
        run: |
          set -euxo pipefail
          test -d "$FW_REPO"
          mkdir -p "$WORKDIR" "$KERN_OUT" "$ROOTFS_DIR" "$ARTIFACT_DIR"

      - name: Apply patches and build kernel
        id: kernel
        run: |
          scripts/ci/20_build_kernel.sh
          KREL="$(cat "$WORKDIR/kernel-release.txt")"
          echo "KREL=$KREL" >> "$GITHUB_ENV"
          echo "kernel_release=$KREL" >> "$GITHUB_OUTPUT"

      - name: Bootstrap Fedora rootfs
        run: |
          set -euxo pipefail
          sudo docker run --rm \
            -v "$GITHUB_WORKSPACE":"$GITHUB_WORKSPACE" \
            -w "$GITHUB_WORKSPACE" \
            --user root \
            "fedora:${FEDORA_RELEASE}" \
            bash -euxo pipefail -c '
              dnf -y --installroot="'"$ROOTFS_DIR"'" --releasever="'"$FEDORA_RELEASE"'" --forcearch=aarch64 --use-host-config \
                --exclude=gnome-boxes,gnome-connections,gnome-browser-connector,snapshot,gnome-weather,gnome-contacts,gnome-maps,simple-scan,gnome-clocks,yelp,gnome-user-docs,gnome-calculator,gnome-calendar \
                install \
                @core @standard @gnome-desktop \
                grub2-efi-aa64-modules efibootmgr shim-aa64 \
                gnome-tweaks langpacks-zh_CN fcitx5-chinese-addons \
                telnet mpv v4l-utils vim git htop fastfetch screen firefox
            '

      - name: Populate rootfs (kernel + firmware + tools)
        run: |
          scripts/ci/40_populate_rootfs.sh

      - name: Create disk image and configure boot
        run: |
          scripts/ci/50_make_image.sh

      - name: Package image and generate release info
        id: package
        run: |
          scripts/ci/60_package_release.sh
          TAG_NAME="$(cat "$WORKDIR/tag-name.txt")"
          KREL="$(cat "$WORKDIR/kernel-release-export.txt")"
          PACKAGE_GLOB="$(cat "$WORKDIR/package-glob.txt")"
          RELEASE_BODY_FILE="$(cat "$WORKDIR/release-body-file.txt")"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "artifact_dir=$ARTIFACT_DIR" >> "$GITHUB_OUTPUT"
          echo "kernel_release=$KREL" >> "$GITHUB_OUTPUT"
          echo "package_glob=$PACKAGE_GLOB" >> "$GITHUB_OUTPUT"
          echo "release_body_file=$RELEASE_BODY_FILE" >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts (workflow)
        uses: actions/upload-artifact@v6
        with:
          name: fedora-gaokun3-build
          path: |
            ${{ steps.package.outputs.artifact_dir }}/gaokun3_defconfig
            ${{ steps.package.outputs.artifact_dir }}/${{ steps.package.outputs.package_glob }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: ${{ steps.package.outputs.tag_name }}
          name: Fedora Linux ${{ env.FEDORA_RELEASE }} - gaokun3 - ${{ steps.package.outputs.kernel_release }}
          body_path: ${{ steps.package.outputs.artifact_dir }}/${{ steps.package.outputs.release_body_file }}
          files: |
            ${{ steps.package.outputs.artifact_dir }}/gaokun3_defconfig
            ${{ steps.package.outputs.artifact_dir }}/${{ steps.package.outputs.package_glob }}
