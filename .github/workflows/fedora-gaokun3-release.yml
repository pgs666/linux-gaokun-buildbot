name: Build Fedora Gaokun3 Image

on:
  workflow_dispatch:
    inputs:
      fedora_release:
        description: Fedora release version
        required: true
        default: "44"
      kernel_tag:
        description: Linux kernel tag
        required: true
        default: "v7.0-rc4"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-24.04-arm
    env:
      TZ: UTC
      FEDORA_RELEASE: ${{ github.event.inputs.fedora_release }}
      KERNEL_TAG: ${{ github.event.inputs.kernel_tag }}
      IMAGE_SIZE: 12G
      IMAGE_CHUNK_SIZE: 1900M
      GAOKUN_DIR: ${{ github.workspace }}
      WORKDIR: ${{ github.workspace }}/build-fedora
      KERN_SRC: ${{ github.workspace }}/build-fedora/mainline-linux
      KERN_OUT: ${{ github.workspace }}/build-fedora/kernel-out
      ROOTFS_DIR: ${{ github.workspace }}/build-fedora/rootfs
      ARTIFACT_DIR: ${{ github.workspace }}/build-fedora/artifacts
      FW_REPO: ${{ github.workspace }}/firmware-huawei-gaokun3_minimal
      IMAGE_FILE: ${{ github.workspace }}/build-fedora/fedora-${{ github.event.inputs.fedora_release }}-gaokun3.img

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout Linux source
        uses: actions/checkout@v4
        with:
          repository: torvalds/linux
          ref: ${{ env.KERNEL_TAG }}
          fetch-depth: 1
          path: build-fedora/mainline-linux

      - name: Install host dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            git make bc bison flex cpio rsync kmod fakeroot \
            libssl-dev libelf-dev dwarves ccache \
            dnf curl jq \
            parted dosfstools e2fsprogs btrfs-progs zstd xz-utils python3

      - name: Restore caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.ccache
            ~/.cache/dnf
          key: gaokun3-fedora-${{ env.FEDORA_RELEASE }}-${{ env.KERNEL_TAG }}-${{ hashFiles('gaokun-patches/*.patch', 'scripts/ci/*.sh', 'tools/**', 'firmware-huawei-gaokun3_minimal/**') }}
          restore-keys: |
            gaokun3-fedora-${{ env.FEDORA_RELEASE }}-${{ env.KERNEL_TAG }}-
            gaokun3-fedora-${{ env.FEDORA_RELEASE }}-

      - name: Prepare build workspace
        run: |
          set -euxo pipefail
          test -d "$FW_REPO"
          mkdir -p "$WORKDIR" "$KERN_OUT" "$ROOTFS_DIR" "$ARTIFACT_DIR"

      - name: Apply patches and build kernel
        id: kernel
        run: |
          scripts/ci/20_build_kernel.sh
          KREL="$(cat "$WORKDIR/kernel-release.txt")"
          echo "KREL=$KREL" >> "$GITHUB_ENV"
          echo "kernel_release=$KREL" >> "$GITHUB_OUTPUT"

      - name: Bootstrap Fedora rootfs
        run: |
          set -euxo pipefail

          KEY_DIR="$WORKDIR/keys"
          mkdir -p "$KEY_DIR"
          FEDORA_KEY_FILE="$KEY_DIR/RPM-GPG-KEY-fedora-${FEDORA_RELEASE}-primary"

          if [ ! -s "$FEDORA_KEY_FILE" ]; then
            curl -fsSL "https://fedoraproject.org/fedora.gpg" -o "$FEDORA_KEY_FILE"
          fi

          test -s "$FEDORA_KEY_FILE" || { echo "Failed to fetch Fedora GPG key from https://fedoraproject.org/fedora.gpg"; exit 1; }

          sudo dnf --installroot="$ROOTFS_DIR" --releasever="$FEDORA_RELEASE" --forcearch=aarch64 -y \
            --setopt=cachedir=$HOME/.cache/dnf \
            --setopt=reposdir=/dev/null \
            --setopt=fastestmirror=False \
            --setopt=deltarpm=False \
            --setopt=fedora.gpgcheck=1 \
            --setopt=fedora.repo_gpgcheck=0 \
            --setopt=fedora.gpgkey=file://${FEDORA_KEY_FILE} \
            --setopt=updates.gpgcheck=1 \
            --setopt=updates.repo_gpgcheck=0 \
            --setopt=updates.gpgkey=file://${FEDORA_KEY_FILE} \
            --repofrompath=fedora,https://dl.fedoraproject.org/pub/fedora/linux/releases/${FEDORA_RELEASE}/Everything/aarch64/os/ \
            --repofrompath=updates,https://dl.fedoraproject.org/pub/fedora/linux/updates/${FEDORA_RELEASE}/Everything/aarch64/ \
            --exclude=gnome-boxes,gnome-connections,snapshot,gnome-weather,showtime,decibels,gnome-contacts,gnome-maps,simple-scan,gnome-clocks,yelp,gnome-user-docs,gnome-calculator,gnome-calendar \
            install \
            @gnome-desktop \
            passwd dnf sudo udev \
            bluez dracut dracut-network btrfs-progs \
            grub2-efi-aa64 grub2-efi-aa64-modules efibootmgr shim-aa64 \
            wpa_supplicant iw wireless-regdb \
            gnome-tweaks flatpak google-noto-sans-cjk-fonts adwaita-mono-fonts \
            fcitx5-chinese-addons fcitx5-configtool \
            parted iproute net-tools traceroute ncat telnet iputils which \
            f44-backgrounds-gnome mpv vim git openssh-server curl htop fastfetch screen nano firefox

      - name: Populate rootfs (kernel + firmware + tools)
        run: |
          scripts/ci/40_populate_rootfs.sh

      - name: Create disk image and configure boot
        run: |
          scripts/ci/50_make_image.sh

      - name: Package image and generate release info
        id: package
        run: |
          scripts/ci/60_package_release.sh
          TAG_NAME="$(cat "$WORKDIR/tag-name.txt")"
          KREL="$(cat "$WORKDIR/kernel-release-export.txt")"
          PACKAGE_GLOB="$(cat "$WORKDIR/package-glob.txt")"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "artifact_dir=$ARTIFACT_DIR" >> "$GITHUB_OUTPUT"
          echo "kernel_release=$KREL" >> "$GITHUB_OUTPUT"
          echo "package_glob=$PACKAGE_GLOB" >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts (workflow)
        uses: actions/upload-artifact@v4
        with:
          name: fedora-gaokun3-build
          path: |
            ${{ steps.package.outputs.artifact_dir }}/gaokun3_defconfig
            ${{ steps.package.outputs.artifact_dir }}/release-info.txt
            ${{ steps.package.outputs.artifact_dir }}/SHA256SUMS.txt
            ${{ steps.package.outputs.artifact_dir }}/${{ steps.package.outputs.package_glob }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.package.outputs.tag_name }}
          name: Fedora ${{ env.FEDORA_RELEASE }} - gaokun3 - ${{ steps.package.outputs.kernel_release }}
          body_path: ${{ steps.package.outputs.artifact_dir }}/release-info.txt
          files: |
            ${{ steps.package.outputs.artifact_dir }}/gaokun3_defconfig
            ${{ steps.package.outputs.artifact_dir }}/release-info.txt
            ${{ steps.package.outputs.artifact_dir }}/SHA256SUMS.txt
            ${{ steps.package.outputs.artifact_dir }}/${{ steps.package.outputs.package_glob }}
